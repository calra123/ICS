<!doctype html>
<html lang="en">
  <head>

    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <link rel="manifest" href="/site.webmanifest" />

    <link rel="shortcut icon" href="/favicon.ico" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; connect-src 'self' http://localhost:8787; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com;"

    <title>timo: Right on Time!</title>
    <link href="./dist/output.css" rel="stylesheet" />
  </head>
  <body class="bg-blue-100 font-nunito">
    <div class="flex flex-wrap items-center justify-center mt-10">
      <div class="w-1/2 flex justify-end pr-2">
        <img
          src="./timo.png"
          class="w-32 h-32 object-contain"
          alt="Small Logo"
        />
      </div>

      <div class="w-1/2 flex flex-col justify-center">
        <h1 class="text-4xl font-bold">timo</h1>
        <p class="text-sm text-gray-600 max-w-xs">create. download. share.</p>
      </div>
    </div>

    <div id="creator-ui" style="display: block">
      <form id="form" class="px-4 my-22 max-w-3xl mx-auto space-y-6">
        <div>
          <p class="text-3xl font-semibold">create a reminder</p>
        </div>

        <p class="">
          <label for="title">title</label>
          <input
            class="bg-blue-50 border border-gray-400 block py-2 px-4 w-full rounded focus:outline-none focus:border-teal-500"
            type="text"
            id="title"
            name="event_title"
            required
          />
        </p>
        <div class="flex space-x-2">
          <p class="">
            <label for="start_date">start date</label>
            <input
              class="bg-blue-50 border border-gray-400 block py-2 px-4 w-full rounded focus:outline-none focus:border-teal-500"
              type="date"
              id="start_date"
              name="start_date"
            />
          </p>
          <p>
            <label for="start_time">start time</label>
            <input
              id="start_time"
              class="bg-blue-50 border border-gray-400 block py-2 px-4 w-full rounded focus:border-teal-500"
              type="time"
              name="start_time"
              value="09:00"
            />
          </p>
        </div>
        <div class="flex space-x-2">
          <p class="">
            <label for="end_date">end date</label>
            <input
              class="bg-blue-50 border border-gray-400 block py-2 px-4 w-full rounded focus:outline-none focus:border-teal-500"
              type="date"
              id="end_date"
              name="end_date"
            />
          </p>

          <p>
            <label for="end_time">end time</label>
            <input
              id="end_time"
              class="bg-blue-50 border border-gray-400 block py-2 px-4 w-full rounded focus:border-teal-500"
              type="time"
              name="end_time"
              value="09:10"
            />
          </p>
        </div>
        <div>
          <input
            type="checkbox"
            id="checkbox"
            name="repeat"
            class="w-4 h-4 transform scale-150 mx-1"
          />
          <label for="repeat">repeats?</label>
        </div>
        <div class="hidden" id="frequency_container">
          <div>
            <p>
              <input
                type="radio"
                name="frequency_type"
                value="daily"
                id="daily"
              />
              <label for="daily"
                >daily: repeat every
                <input
                  class="bg-blue-50 border border-gray-400 w-20 py-2 px-4 my-2 rounded-full focus:outline-none focus:border-teal-500"
                  type="number"
                  name="freq_num"
                  value="1"
                  id="daily_num"
                />
                day(s).
              </label>
            </p>
            <div>
              <input
                type="radio"
                name="frequency_type"
                value="weekly"
                id="weekly"
              />
              <label for="weekly"
                >weekly: repeat every
                <input
                  class="bg-blue-50 w-20 border border-gray-400 py-2 px-4 my-2 rounded-full focus:outline-none focus:border-teal-500"
                  type="number"
                  name="freq_num"
                  value="1"
                  id="weekly_num"
                />
                week(s).
              </label>
              <div class="mt-4">
                <div
                  class="grid grid-cols-7 border border-gray-400 rounded-full overflow-hidden bg-blue-50"
                >
                  <div
                    class="flex flex-col items-center p-2 border-r border-gray-400 last:border-r-0"
                  >
                    <label for="sun" class="text-xs font-bold mb-1">SUN</label>
                    <input
                      type="checkbox"
                      name="day"
                      value="SU"
                      id="sun"
                      class="w-4 h-4"
                    />
                  </div>
                  <div
                    class="flex flex-col items-center p-2 border-r border-gray-400 last:border-r-0"
                  >
                    <label for="mon" class="text-xs font-bold mb-1">MON</label>
                    <input
                      type="checkbox"
                      name="day"
                      value="MO"
                      id="mon"
                      class="w-4 h-4"
                    />
                  </div>
                  <div
                    class="flex flex-col items-center p-2 border-r border-gray-400 last:border-r-0"
                  >
                    <label for="tue" class="text-xs font-bold mb-1">TUE</label>
                    <input
                      type="checkbox"
                      name="day"
                      value="TU"
                      id="tue"
                      class="w-4 h-4"
                    />
                  </div>
                  <div
                    class="flex flex-col items-center p-2 border-r border-gray-400 last:border-r-0"
                  >
                    <label for="wed" class="text-xs font-bold mb-1">WED</label>
                    <input
                      type="checkbox"
                      name="day"
                      value="WE"
                      id="wed"
                      class="w-4 h-4"
                    />
                  </div>
                  <div
                    class="flex flex-col items-center p-2 border-r border-gray-400 last:border-r-0"
                  >
                    <label for="thu" class="text-xs font-bold mb-1">THU</label>
                    <input
                      type="checkbox"
                      name="day"
                      value="TH"
                      id="thu"
                      class="w-4 h-4"
                    />
                  </div>
                  <div
                    class="flex flex-col items-center p-2 border-r border-gray-400 last:border-r-0"
                  >
                    <label for="fri" class="text-xs font-bold mb-1">FRI</label>
                    <input
                      type="checkbox"
                      name="day"
                      value="FR"
                      id="fri"
                      class="w-4 h-4"
                    />
                  </div>
                  <div
                    class="flex flex-col items-center p-2 border-r border-gray-400 last:border-r-0"
                  >
                    <label for="sat" class="text-xs font-bold mb-1">SAT</label>
                    <input
                      type="checkbox"
                      name="day"
                      value="SA"
                      id="sat"
                      class="w-4 h-4"
                    />
                  </div>
                </div>
              </div>
            </div>
            <p>
              <input
                type="radio"
                name="frequency_type"
                value="yearly"
                id="yearly"
              />
              <label for="yearly"
                >yearly: repeat every
                <input
                  class="bg-blue-50 border border-gray-400 w-20 py-2 px-4 my-2 rounded-full focus:outline-none focus:border-teal-500"
                  type="number"
                  name="freq_num"
                  value="1"
                  id="yearly_num"
                />
                year(s) .
              </label>
            </p>
          </div>
          <div>
            <label>
              repeat for how many times?
              <input
                class="bg-blue-50 border border-gray-400 w-20 py-2 px-4 my-2 rounded-full focus:outline-none focus:border-teal-500"
                type="number"
                name="freq_num"
                value="1"
                id="count"
            /></label>
          </div>
        </div>
        <p>
          <label for="description">description</label>
          <textarea
            class="bg-blue-50 border border-gray-400 block py-2 px-4 w-full rounded focus:outline-none focus:border-teal-500"
            id="description"
            rows="4"
            cols="50"
            placeholder="tell the correct chai recipe"
          ></textarea>
        </p>
        <p>
          <label for="location">location</label>
          <input
            type="text"
            class="bg-blue-50 border border-gray-400 block py-2 px-4 w-full rounded focus:outline-none focus:border-teal-500"
            id="location"
            rows="4"
            cols="50"
            placeholder="map's link to friend's home"
          />
        </p>
        <button
          id="button"
          class="font-semibold bg-blue-800 hover:bg-blue-900 transition-colors duration-200 ease-in-out px-4 py-2 text-white rounded"
          type="submit"
          name="Submit"
          value="Button"
        >
          download
        </button>
        <button
          id="share"
          class="font-semibold bg-blue-800 hover:bg-blue-900 transition-colors duration-200 ease-in-out px-4 py-2 text-white rounded"
          name="Share"
          value="Button"
        >
          share
        </button>
      </form>
    </div>
    <dialog
      id="my-dialog"
      class="text-center m-auto bg-blue-100 shadow-lg p-0 overflow-hidden"
    >
      <div class="relative flex flex-col items-center w-full p-10">
        <div class="absolute top-0 right-0 p-4">
          <button
            class="cursor-pointer font-semibold px-6 py-4 text-xl"
            autofocus
            id="close"
          >
            X
          </button>
        </div>
        <p>Success!</p>
        <div class="flex items-center gap-0 px-2 py-2">
          <input
            id="copy-link"
            type="text"
            class="bg-blue-50 border border-gray-400 block py-2 px-4 rounded focus:outline-none focus:border-teal-500"
          />
          <button
            class="font-semibold bg-blue-800 hover:bg-blue-900 transition-colors duration-200 ease-in-out px-4 py-2 text-white rounded border border-transparent"
            id="copy-btn"
          >
            Copy
          </button>
        </div>
      </div>
    </dialog>
    <div
      id="toast"
      class="bg-gray-600 font-semibold border rounded-lg border-4 border-black-900 p-3 fixed bottom-6 left-5 flex text-white"
      style="display: none"
    >
      copied to clipboard
    </div>
    <div id="download-ui" style="display: none">
      <p class="text-center px-4 mx-auto my-33 text-3xl">
        Event is getting downloaded <br />
        3...2...1
      </p>
      <br />
      <div class="text-center">
        <button
          id="redirect-home"
          class="text-xl font-semibold bg-blue-800 px-4 py-2 text-white rounded"
          name="redirect-home"
          value="Button"
        >
          Create Your Own Reminder
        </button>
      </div>
    </div>

    <footer class="mt-20 py-10 border-t border-gray-200">
      <div class="text-center text-xs text-gray-400 italic">
        <p>&copy; 2026 timo &bull; made by Calra, one div at a time</p>
      </div>
    </footer>

    <script src="main.js"></script>
  </body>
</html>
